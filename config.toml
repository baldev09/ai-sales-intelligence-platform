[theme]
base                     = "light"
primaryColor             = "#1A56DB"
backgroundColor          = "#F4F6F9"
secondaryBackgroundColor = "#FFFFFF"
textColor                = "#0D1117"
font                     = "sans serif"

[server]
headless         = true
port             = 8501
enableCORS       = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode      = "minimal"
